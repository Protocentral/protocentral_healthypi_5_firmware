name=ProtoCentral HealthyPi 5
version=2.0.2
author=ProtoCentral Electronics
maintainer=ProtoCentral Electronics <support@protocentral.com>
sentence=Dual-core NEXT runtime and board support for the ProtoCentral HealthyPi 5 (RP2040).
paragraph=Encapsulates the production HealthyPi 5 NEXT dual-core AMP architecture for the arduino-pico core: core1 does lossless 128 SPS acquisition (MAX30001 + AFE4400) into a lock-free ring while core0 runs a broker, per-sink queues, a built-in OpenView 2 streamer, 1 Hz telemetry and a hardware watchdog. Includes board.h, the canonical pin map for HealthyPi 5 revisions 5.2-5.7, and auto-detects the on-board temperature sensor (MAX30205 or AS6221). Requires the arduino-pico FreeRTOS variant (include <FreeRTOS.h> in the sketch).
category=Sensors
url=https://github.com/Protocentral/protocentral_healthypi_5_firmware
architectures=rp2040
includes=Protocentral_HealthyPi_5.h
depends=ProtoCentral MAX30001 (>=2.0.0),ProtoCentral AFE4490 PPG and SpO2 boards library (>=1.4.0)
